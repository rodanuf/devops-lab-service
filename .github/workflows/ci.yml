name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Build Docker image
      run: docker build -t myapp:latest .
      
    - name: Run tests
      run: |
        docker run --rm myapp:latest echo "Tests passed"

  deploy:
    needs: build-and-test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to VM via SSH
      shell: powershell
      run: |
        ssh -o StrictHostKeyChecking=no -i "C:\Users\Admin\.ssh\vm_deploy_key" -p 10022 admin@127.0.0.1 `
        "cd /srv/company/projects/lab_service/devops-lab-service ; `
         git pull origin main ; `
         docker-compose down ; `
         docker-compose up -d --build ; `
         docker system prune -f"
